;
; Minimal representative Speeduino INI fixture.
; Curated from speeduino-202501.6/speeduino.ini to exercise:
;   - [Constants] scalars, bits/enums, and arrays
;   - [PcVariables] scalars (no offset)
;   - [TableEditor] with axes and labels
;   - [UserDefined] dialogs, fields, panels, and static text
;   - [Menu] groups with subMenu and groupChildMenu
;   - [SettingContextHelp] help text
;   - [ConstantsExtensions] requires_power_cycle
;   - Visibility expressions on fields and menus
;   - [VeAnalyze] autotune map with filter gates
;   - [WueAnalyze] warmup enrichment autotune map
;   - [Tools] addTool declarations
;   - #if/#else/#endif/#set/#unset preprocessor directives
;
#unset enablehardware_test

[MegaTune]
  signature  = "Speeduino 202501.6"
  queryCommand = "S"
  versionInfo = "Q"
  pageReadCommand    = "r%2i%2o%2c"
  pageValueWrite     = "w%2i%2o%2c%v"
  pageChunkWrite     = "w%2i%2o%2c%v"
  burnCommand        = "b%2i"
  endianness = big
  pageSize = 128, 64, 128
  blockingFactor = 121
  tableBlockingFactor = 512

[Constants]

  page = 1

  ;--- Engine ---
  reqFuel         = scalar, U08,   12, "ms",   0.1,   0.0,   0.0,  25.5,  1
  nCylinders      = scalar, U08,   13, "",      1,     0,     1,    12,    0
  injType         = bits,   U08,   14, [0:0],  "Port", "Throttle Body"
  nFuelChannels   = scalar, U08,   15, "",      1,     0,     1,    8,     0
  engineStrokes   = bits,   U08,   16, [0:0],  "4-stroke", "2-stroke"
  sparkMode       = bits,   U08,   17, [0:2],  "Wasted Spark", "Sequential", "Wasted COP", "INVALID", "Rotary"
  IgMap           = bits,   U08,   18, [0:1],  "Speed Density", "Alpha-N", "MAF", "INVALID"

  page = 2

  ;--- Spark ---
  FixAng          = scalar, S08,   0,  "deg",   1,     0,   -90,   90,    0
  CrankAng        = scalar, S08,   1,  "deg",   1,     0,   -90,   90,    0
  IdleAdv         = scalar, U08,   2,  "deg",   1,     0,     0,   90,    0
  useDwellMap     = bits,   U08,   3,  [0:0],  "Off", "On"
  sparkDur        = scalar, U08,   4,  "deg",   1,     0,     0,   90,    0

  page = 3

  ;--- AFR / EGO ---
  egoType         = bits,   U08,   0,  [0:1],  "Off", "Narrowband", "Wideband", "INVALID"
  stoich          = scalar, U08,   1,  "",      0.1,   0.0,   5.0,  25.0,  1
  egoCount        = scalar, U08,   2,  "",      1,     0,     0,    8,     0
  boostEnabled    = bits,   U08,   3,  [0:0],  "Off", "On"

  page = 5

  ;--- Table data ---
  veTable1        = array,  S16,   0,  [16x16], "%",   0.5, 0.0,   0.0,  200.0, 1
  sparkTable1     = array,  S16,   128, [16x16],"deg", 0.5, 0.0, -90.0,   90.0, 1

[PcVariables]
  ; PC-side variables — no offset
  rpmhigh   = scalar, U16, "rpm", 1, 0,     0, 30000, 0
  rpmwarn   = scalar, U16, "rpm", 1, 0,     0, 30000, 0
  rpmdang   = scalar, U16, "rpm", 1, 0,     0, 30000, 0
  maphigh   = scalar, U16, "kPa", 1, 0,     0, 300,   0
  mapwarn   = scalar, U16, "kPa", 1, 0,     0, 300,   0
  idleUnits = bits,   U08, [0:2], "None", "On/Off", "Duty Cycle", "Steps"

[TableEditor]

  table = veTable1Tbl, veTable1Map, "VE Table", 1
    topicHelp = helpVeTable
    xBins = rpmBins, RPMChannel
    yBins = mapBins, mapChannel
    zBins = veTable1
    xyLabels = "RPM", "MAP"

  table = sparkTbl, sparkMap, "Spark Table", 2
    topicHelp = helpSparkTable
    xBins = rpmBins2, RPMChannel
    yBins = mapBins2, mapChannel
    zBins = sparkTable1
    xyLabels = "RPM", "MAP"

[UserDefined]

  dialog = engine_constants, "Engine Constants"
    field = "Required Fuel",         reqFuel
    field = "Number of cylinders",   nCylinders
    field = "Injector type",         injType
    field = "Fuel channels",         nFuelChannels
    field = "Engine type",           engineStrokes
    field = "Ignition algorithm",    IgMap

  dialog = sparkSettings, "Spark Settings"
    field = "Fixed timing angle",    FixAng
    field = "Crank angle",           CrankAng
    field = "Idle advance",          IdleAdv
    field = "Dwell map enable",      useDwellMap
    panel = dwellPanel,              { useDwellMap == 1 }

  dialog = dwellPanel, "Dwell Options"
    field = "Spark duration",        sparkDur

  dialog = egoControl, "AFR/O2 Settings"
    field = "EGO sensor type",       egoType
    field = "Stoich ratio",          stoich,          { egoType > 0 }
    field = "Number of EGO sensors", egoCount,        { egoType > 0 }

  dialog = boostSettings, "Boost Control"
    field = "Boost control",         boostEnabled

  dialog = gaugeLimits, "Gauge Limits"
    field = "RPM high",              rpmhigh
    field = "RPM warning",           rpmwarn
    field = "RPM danger",            rpmdang
    field = "MAP high",              maphigh
    field = "MAP warning",           mapwarn

  dialog = veTableDialog, "VE Table"
    panel = veTable1Tbl, North
    panel = engine_constants, South

[SettingContextHelp]
  reqFuel     = "Required fuel in ms at the reference conditions."
  sparkMode   = "Spark output configuration mode."
  egoType     = "Type of EGO (oxygen) sensor fitted."
  stoich      = "Stoichiometric AFR for the fuel in use."
  boostEnabled= "Enable or disable the boost control output."
  rpmhigh     = "Maximum RPM shown on gauge displays."

[ConstantsExtensions]
  requiresPowerCycle = sparkMode, IgMap, injType, engineStrokes

[Menu]

menuDialog = main

   menu = "Settings"
      subMenu = engine_constants, "Engine Constants"
      subMenu = gaugeLimits,      "Gauge Limits"

   menu = "&Tuning"
      subMenu = egoControl,       "AFR/O2", 3
      groupMenu = "Engine Protection"
        groupChildMenu = boostSettings, "Boost Control", 3
      subMenu = veTableDialog,    "VE Table",    0
      subMenu = sparkTbl,         "Spark Table", 2

   menu = "&Spark"
      subMenu = sparkSettings,    "Spark Settings"
      subMenu = sparkTbl,         "Spark Table", 2, { IgMap != 2 }

#if enablehardware_test
   menu = "Hardware Testing"
      subMenu = outputtest1, "Test Output Hardware"
#endif

[VeAnalyze]
#if LAMBDA
   veAnalyzeMap = veTable1Tbl, lambdaTable1, lambda, egoCorrection
   lambdaTargetTables = lambdaTable1, afrTSCustom
#else
   veAnalyzeMap = veTable1Tbl, afrTable1, afr, egoCorrection
   lambdaTargetTables = afrTable1, afrTSCustom
#endif
   filter = std_xAxisMin
   filter = std_xAxisMax
   filter = std_yAxisMin
   filter = std_yAxisMax
   filter = std_DeadLambda
   filter = minCltFilter, "Minimum CLT", coolant, <, 71, true
   filter = accelFilter, "Accel Flag", engine, &, 16, false
   filter = aseFilter, "ASE Flag", engine, &, 4, false
   filter = overrunFilter, "Overrun", pulseWidth, =, 0, false
   filter = std_Custom

[WueAnalyze]
   wueAnalyzeMap = warmupEnrich, lambdaTable1, lambda, coolant, warmupEnrich, egoCorrection
   filter = std_DeadLambda
   filter = accelFilter, "Accel Flag", engine, &, 16, false
   filter = aseFilter, "ASE Flag", engine, &, 4, false
   filter = overrunFilter, "Overrun", pulseWidth, =, 0, false
   filter = maxTPS, "Max TPS", throttle, >, 15, true
   filter = minRPM, "Min RPM", rpm, <, 300, true
   filter = std_Custom

[Tools]
   addTool = veTableGenerator, "VE Table Generator", veTable1Tbl
   addTool = afrTableGenerator, "AFR Table Generator", afrTable1
